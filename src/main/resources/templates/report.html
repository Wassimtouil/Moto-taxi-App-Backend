<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Daily Operations Dashboard</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 25px;
            color: #1f2d3d;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: auto;
        }

        /* HEADER */
        .header {
            background: #111827;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header table {
            width: 100%;
        }

        .logo {
            width: 55px;
            height: 55px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 13px;
            color: #cbd5e1;
        }

        /* KPI CARDS (TABLE BASED FOR PDF SAFETY) */
        .kpi-table {
            width: 100%;
            margin-bottom: 20px;
        }

        .kpi {
            width: 33%;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            padding: 15px;
            text-align: center;
        }

        .kpi-title {
            font-size: 12px;
            color: #6b7280;
        }

        .kpi-value {
            font-size: 22px;
            font-weight: bold;
            margin-top: 8px;
        }

        .green { color: #16a34a; }
        .blue { color: #2563eb; }
        .orange { color: #f59e0b; }

        /* SECTION */
        .section {
            background: white;
            padding: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #111827;
            color: white;
            padding: 10px;
            font-size: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 12px;
            text-align: center;
        }

        /* BADGES */
        .badge-high {
            background: #ef4444;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
        }

        .badge-medium {
            background: #f59e0b;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
        }

        .badge-low {
            background: #16a34a;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
        }

        /* AI BOX */
        .ai-box {
            background: #f9fafb;
            border-left: 5px solid #2563eb;
            padding: 12px;
            font-size: 12px;
            white-space: pre-line;
        }

        /* PDF SAFE */
        * {
            box-sizing: border-box;
        }

        img {
            max-width: 100%;
        }

        .section, .header {
            page-break-inside: avoid;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <table>
            <tr>
                <td style="width:70px;">
                    <img src="file:src/main/resources/static/logo.png" class="logo" />
                </td>
                <td>
                    <div class="title">Operations Dashboard</div>
                    <div class="subtitle" th:text="'Generated: ' + ${date}"></div>
                </td>
            </tr>
        </table>
    </div>

    <!-- KPI -->
    <table class="kpi-table">
        <tr>
            <td class="kpi">
                <div class="kpi-title">Revenue Today</div>
                <div class="kpi-value green" th:text="${revenue} + ' DT'"></div>
            </td>

            <td class="kpi">
                <div class="kpi-title">Total Trips</div>
                <div class="kpi-value blue" th:text="${trips}"></div>
            </td>

            <td class="kpi">
                <div class="kpi-title">Inactive Drivers</div>
                <div class="kpi-value orange" th:text="${drivers}"></div>
            </td>
        </tr>
    </table>

    <!-- TOP DRIVERS -->
    <div class="section">
        <div class="section-title">Top Drivers</div>

        <table>
            <tr>
                <th>Name</th>
                <th>Revenue</th>
                <th>Trips</th>
            </tr>

            <tr th:each="d : ${topDrivers}">
                <td th:text="${d.driverName}"></td>
                <td th:text="${d.revenue}"></td>
                <td th:text="${d.trips}"></td>
            </tr>
        </table>
    </div>



</div>

</body>
</html>
